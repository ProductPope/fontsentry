# FontSentry classification config. Copy to rules.yaml (gitignored) and edit freely.
#
# The verdict engine is DETERMINISTIC (ADR 0003): no weights, no scores. Everything
# below is pure classification data that the fixed decision table reads. See
# docs/rules.md for the full reference and the decision order.
#
# License verdict per font: OK · NEEDS_CHECK · VIOLATION (each with a reason).
# Privacy verdict is derived from the delivery method — not configured here.

# --- Provably-OPEN signals: any match -> license OK (no registry entry needed) ---

# Substrings looked for in the font's name-table license/copyright strings.
open_license_patterns: ["OFL", "Open Font License", "Apache", "GPL", "Ubuntu Font License"]

# Foundries/owners whose fonts are free to use.
free_owners: ["The Sentinel Type Co-op", "Public Glyphs Foundation"]

# Families that are openly licensed but ship WITHOUT a license string in the name
# table (so open_license_patterns can't see it). Matched by family name;
# `excludes` keeps paid tiers of the same family from being whitelisted.
open_families:
  - contains_all: ["font awesome"]        # Free/Brands are OFL-licensed
    excludes: ["pro", "duotone", "sharp"] # ...but these tiers are paid

# --- Definite-VIOLATION signals (apply only when no valid registry cover exists) ---

# Paid tiers announced by the family name itself (e.g. Font Awesome Pro). Serving
# one with no license on record is a violation on its own.
paid_tier_families:
  - contains_all: ["font awesome", "pro"]
    excludes: []

# Owners/families whose license is known to forbid self-hosting. Names below are
# illustrative placeholders — replace with real ones you track.
self_host_prohibited:
  owners: ["Meridian Letterworks"]
  families: ["Atlas Grotesk Private"]

# --- Evidence-note signals: context for NEEDS_CHECK. These NEVER decide a verdict,
#     they only explain why a font is worth a human check. ---

# Third-party paid CDNs (embedding methods). Delivery from these with no recorded
# license is noted (and is also a privacy/third-party fact).
paid_cdns: ["adobe_fonts", "monotype"]

# Desktop/print formats that rarely carry web-embedding rights.
desktop_formats: ["ttf", "otf"]

# Below this glyph count a web font looks subsetted (a weak, low-confidence hint).
subset_max_glyphs: 256
